<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>MUNDO AVENTURA</title>

    <!-- BOOTSTRAP -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- CSS -->

    <link
    rel="stylesheet"
    href="game.css">

</head>

<body>

    <!-- CANVAS -->

    <canvas id="game"></canvas>

    <!-- ALERTA -->

    <div
    id="gameAlert"
    class="alert d-none position-fixed top-0 start-50 translate-middle-x mt-3">
    </div>

    <!-- MENU PUERTA -->

    <div
    id="doorMenu"
    class="door-menu d-none">

        <div class="door-box">

            <h1 id="doorTitle">

                ⚔️ SIGUIENTE NIVEL

            </h1>

            <p id="doorText">

                ¿Deseas continuar?

            </p>

            <div class="door-buttons">

                <button
                id="continueLevel"
                class="btn btn-success">

                    Avanzar

                </button>

                <button
                id="backMenu"
                class="btn btn-danger">

                    Salir al menú

                </button>

            </div>

        </div>

    </div>

    <!-- AUDIO -->

    <audio
    id="worldMusic"
    loop>

        <source
        src="../audio/world.mp3"
        type="audio/mp3">

    </audio>

    <audio
    id="battleMusic"
    loop>

        <source
        src="../audio/battle.mp3"
        type="audio/mp3">

    </audio>

    <!-- JS -->

    <script
    type="module"
    src="game.js"></script>

</body>

</html>
